      <stop offset="0%" stop-color="#bdf3ff"/>
      <stop offset="35%" stop-color="#4fe0ff"/>
      <stop offset="100%" stop-color="#1283c7"/>
    </radialGradient>
    <linearGradient id="r" x1="0%" y1="0%" x2="100%" y2="100%">

    <circle r="20" fill="url(#c)" filter="url(#g)"/>
    <g stroke="#9af0ff" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-92" x2="0" y2="-80"/>
      <line x1="0" y1="92" x2="0" y2="80"/>

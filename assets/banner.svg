<svg width="1280" height="440" viewBox="0 0 1280 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Open Assistant — an open-source JARVIS for your computer">
  <defs>
    <radialGradient id="bg" cx="24%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#0b1424"/>
      <stop offset="55%" stop-color="#070c16"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bdf3ff"/>
      <stop offset="35%" stop-color="#4fe0ff"/>
      <stop offset="100%" stop-color="#1283c7"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eeaff"/>
      <stop offset="100%" stop-color="#5b6bff"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eaf3ff"/>
      <stop offset="100%" stop-color="#9fd8ff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="440" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1a2b45" stroke-width="1" opacity="0.45">
    <line x1="0" y1="110" x2="1280" y2="110"/>
    <line x1="0" y1="220" x2="1280" y2="220"/>
    <line x1="0" y1="330" x2="1280" y2="330"/>
    <line x1="640" y1="0" x2="640" y2="440"/>
    <line x1="900" y1="0" x2="900" y2="440"/>
    <line x1="1160" y1="0" x2="1160" y2="440"/>
  </g>

  <!-- ambient glow behind reactor -->
  <circle cx="300" cy="220" r="150" fill="#1ea8e0" opacity="0.18" filter="url(#softglow)"/>

  <!-- arc reactor -->
  <g transform="translate(300,220)">
    <!-- outer faint ring -->
    <circle r="156" fill="none" stroke="#274a6e" stroke-width="1.5" opacity="0.7"/>
    <!-- segmented ring -->
    <circle r="124" fill="none" stroke="url(#ring)" stroke-width="7"
            stroke-dasharray="15 11" opacity="0.95" filter="url(#glow)"/>
    <!-- thin ring -->
    <circle r="96" fill="none" stroke="#7fe6ff" stroke-width="1.5" opacity="0.6"/>
    <!-- inner accent ring -->
    <circle r="60" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.95" filter="url(#glow)"/>
    <!-- core -->
    <circle r="36" fill="url(#core)" filter="url(#glow)"/>
    <circle r="36" fill="none" stroke="#eafbff" stroke-width="1.5" opacity="0.85"/>

    <!-- cardinal ticks -->
    <g stroke="#9af0ff" stroke-width="3" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="-150" x2="0" y2="-132"/>
      <line x1="0" y1="150" x2="0" y2="132"/>
      <line x1="-150" y1="0" x2="-132" y2="0"/>
      <line x1="150" y1="0" x2="132" y2="0"/>
    </g>

    <!-- sub-agent orbit nodes (master + spawned agents) -->
    <g>
      <circle cx="176" cy="-44" r="6" fill="#7cf0ff" filter="url(#glow)"/>
      <line x1="36" y1="0" x2="170" y2="-43" stroke="#3a6f9a" stroke-width="1" opacity="0.5"/>
      <circle cx="168" cy="76" r="6" fill="#8ea0ff" filter="url(#glow)"/>
      <line x1="32" y1="14" x2="162" y2="74" stroke="#3a6f9a" stroke-width="1" opacity="0.5"/>
      <circle cx="-176" cy="40" r="6" fill="#7cf0ff" filter="url(#glow)"/>
      <line x1="-34" y1="8" x2="-170" y2="39" stroke="#3a6f9a" stroke-width="1" opacity="0.5"/>
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(560,170)" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="0" y="0" font-size="62" font-weight="800" letter-spacing="1.5" fill="url(#title)">OPEN ASSISTANT</text>
    <text x="2" y="44" font-size="23" font-weight="500" fill="#9fb4d4">An open-source JARVIS for your computer.</text>

    <!-- chips -->
    <g font-size="14" font-weight="600" fill="#bfe9ff">
      <rect x="2" y="74" width="118" height="30" rx="15" fill="#0e2438" stroke="#2c6f93" stroke-width="1"/>
      <text x="22" y="94">local-first</text>
      <rect x="132" y="74" width="98" height="30" rx="15" fill="#0e2438" stroke="#2c6f93" stroke-width="1"/>
      <text x="150" y="94">agentic</text>
      <rect x="242" y="74" width="150" height="30" rx="15" fill="#0e2438" stroke="#2c6f93" stroke-width="1"/>
      <text x="262" y="94">voice + computer</text>
      <rect x="404" y="74" width="150" height="30" rx="15" fill="#0e2438" stroke="#2c6f93" stroke-width="1"/>
      <text x="424" y="94">MCP + skills</text>
    </g>
  </g>
</svg>
